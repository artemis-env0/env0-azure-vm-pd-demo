version: 2
shell: bash

deploy:
  steps:
    terraformInit:
      before:
        - name: "Network: Deployment Context"
          run: |
            echo "Preparing Env0 Live Demo AGA network deployment"
            echo "Working directory: $(pwd)"

    terraformPlan:
      before:
        - name: "Network: Validate Demo Inputs"
          run: |
            echo "Expected name_prefix: Env0-Live-Demo-AGA"
            echo "Expected location: eastus"
            echo "Expected VNet CIDR: 10.40.0.0/16"
            echo "Expected subnet CIDR: 10.40.1.0/24"

      after:
        - name: "Network: Plan Complete"
          run: |
            echo "Network plan completed"

    terraformApply:
      after:
        - name: "Network: Apply Complete"
          run: |
            echo "Network apply completed"
